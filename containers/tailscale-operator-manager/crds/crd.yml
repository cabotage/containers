apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cabotagetailscaleoperatorconfigs.cabotage.io
spec:
  scope: Namespaced
  group: cabotage.io
  names:
    kind: CabotageTailscaleOperatorConfig
    plural: cabotagetailscaleoperatorconfigs
    singular: cabotagetailscaleoperatorconfig
    shortNames:
      - tsconfig
      - tsconfigs
  versions:
    - name: v1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: State
          type: string
          jsonPath: .status.reconcile_operator.state
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - clientId
                - organizationSlug
              properties:
                clientId:
                  type: string
                  maxLength: 255
                  description: >
                    Tailscale OIDC federated identity client ID.
                    Cabotage mints JWTs signed by its OIDC issuer and
                    writes them to a K8s Secret for the operator to use.
                defaultTags:
                  type: string
                  maxLength: 512
                  pattern: "^(tag:[a-z0-9-]+(,\\s*tag:[a-z0-9-]+)*)?$"
                  description: >
                    Default ACL tags for operator-created nodes
                    (e.g. tag:cabotage).
                organizationSlug:
                  type: string
                  maxLength: 63
                  pattern: "^[a-z0-9]([a-z0-9-]*[a-z0-9])?$"
                  description: >
                    Cabotage organization slug for labeling.
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
