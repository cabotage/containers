apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cabotageenrollments.cabotage.io
spec:
  scope: Namespaced
  group: cabotage.io
  names:
    kind: CabotageEnrollment
    plural: cabotageenrollments
    singular: cabotageenrollment
    shortNames:
      - enrollments
      - enrollment
  versions:
    - name: v1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Ready
          type: string
          description: All required consul/vault policies created
          jsonPath: .status.summary.ready
        - name: Resources
          type: string
          jsonPath: .status.summary.resources
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
